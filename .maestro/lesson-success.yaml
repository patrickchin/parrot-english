url: ${MAESTRO_APP_URL}/?parrotE2eScenario=correct&parrotE2eAutostart=1
name: Child completes the first speaking turn with mocked evaluation
tags:
  - e2e
  - mocked-api
---
- launchApp

# The child's turn must be obvious before recording starts.
- extendedWaitUntil:
    visible: "轮到你：Hello, Peppa!"
    timeout: 8000

# The mocked evaluation should advance the lesson without making an LLM call.
- extendedWaitUntil:
    visible: "正在检查发音"
    timeout: 8000
- extendedWaitUntil:
    visible: "太棒了！我们继续下一句。"
    timeout: 8000
- tapOn:
    id: "Next scene"
    waitToSettleTimeoutMs: 100
- extendedWaitUntil:
    visible: "Oh! I can't reach it."
    timeout: 5000
