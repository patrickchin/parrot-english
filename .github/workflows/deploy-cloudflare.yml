name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-workers-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare build metadata
        id: build-metadata
        run: |
          PACKAGE_SERIES=$(node -p "require('./package.json').version.split('.').slice(0, 2).join('.')")
          echo "version=${PACKAGE_SERIES}.$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build
        run: npm run build

      - name: Typecheck LiveKit agent
        run: npm run build:agent

      - name: Verify Cloudflare credentials
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_API_TOKEN"

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply parrot-english --remote

      - name: Deploy to Cloudflare Workers
        run: |
          npx wrangler deploy --config wrangler.jsonc \
            --tag "${{ steps.build-metadata.outputs.sha }}" \
            --var "PARROT_BACKEND_VERSION:${{ steps.build-metadata.outputs.version }}" \
            --var "PARROT_BACKEND_COMMIT_SHA:${{ steps.build-metadata.outputs.sha }}"
